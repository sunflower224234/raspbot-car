<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>陪伴型家居小车控制中心</title>
  <style>
    :root {
      --bg0: #eef2f8;
      --bg1: #f8f7fb;
      --ink: #11131a;
      --muted: rgba(17, 19, 26, .58);
      --glass: rgba(255, 255, 255, .58);
      --glass-strong: rgba(255, 255, 255, .76);
      --stroke: rgba(255, 255, 255, .72);
      --stroke-dark: rgba(18, 22, 30, .08);
      --shadow: 0 28px 80px rgba(35, 39, 55, .16);
      --shadow-soft: 0 14px 34px rgba(35, 39, 55, .10);
      --accent: #6e5cff;
      --accent2: #22d3ee;
      --accent3: #ff4d9d;
      --danger: #ff3b30;
      --green: #34c759;
      --orange: #ff9500;
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(126, 113, 255, .28), transparent 32%),
        radial-gradient(circle at 84% 22%, rgba(34, 211, 238, .22), transparent 30%),
        radial-gradient(circle at 75% 85%, rgba(255, 77, 157, .18), transparent 35%),
        linear-gradient(135deg, var(--bg0), var(--bg1));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.45) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.48), transparent 70%);
    }

    .blob {
      position: fixed;
      filter: blur(38px);
      opacity: .62;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 320px; height: 320px; left: -80px; top: 80px; background: #b9afff; border-radius: 50%; }
    .b2 { width: 280px; height: 280px; right: -70px; top: 170px; background: #a6f0ff; border-radius: 50%; }
    .b3 { width: 360px; height: 360px; right: 12%; bottom: -170px; background: #ffd0ec; border-radius: 50%; }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100vw - 34px));
      margin: 28px auto 42px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      grid-template-areas:
        "main right"
        "logs logs";
      gap: 22px;
      align-items: start;
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(1.35);
      -webkit-backdrop-filter: blur(28px) saturate(1.35);
    }

    .sidebar {
      border-radius: var(--radius-xl);
      padding: 22px;
      min-height: calc(100vh - 70px);
      position: sticky;
      top: 24px;
    }

    .brand {
      display: flex;
      gap: 13px;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(110, 92, 255, .24);
    }
    .brand h1 { font-size: 18px; margin: 0; letter-spacing: -.02em; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

    .nav { display: grid; gap: 9px; }
    .nav button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 13px 14px;
      background: rgba(255,255,255,.46);
      color: rgba(17,19,26,.75);
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 14px;
      cursor: pointer;
      transition: .18s ease;
      box-shadow: inset 0 1px rgba(255,255,255,.55);
    }
    .nav button:hover, .nav button.active {
      background: rgba(17,19,26,.9);
      color: white;
      transform: translateY(-1px);
    }

    .main { grid-area: main; display: grid; gap: 22px; min-width: 0; }
    .hero {
      border-radius: var(--radius-xl);
      padding: 24px;
      overflow: hidden;
      position: relative;
      min-height: 210px;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -90px auto;
      width: 420px;
      height: 230px;
      background: linear-gradient(135deg, rgba(110,92,255,.16), rgba(34,211,238,.20), rgba(255,77,157,.16));
      border-radius: 70px;
      transform: rotate(-12deg);
      filter: blur(1px);
    }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 18px; position: relative; z-index: 2; }
    .kicker { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .hero h2 { font-size: clamp(32px, 4vw, 58px); line-height: .96; letter-spacing: -.055em; margin: 12px 0 12px; max-width: 650px; }
    .hero p { color: var(--muted); margin: 0; font-size: 15px; line-height: 1.75; max-width: 650px; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.68);
      box-shadow: inset 0 1px rgba(255,255,255,.65), 0 10px 24px rgba(35,39,55,.08);
      white-space: nowrap;
      font-weight: 700;
      font-size: 13px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 5px rgba(52,199,89,.14); }
    .dot.running { background: var(--orange); box-shadow: 0 0 0 5px rgba(255,149,0,.16); animation: pulse 1.2s infinite; }
    .dot.stop { background: var(--danger); box-shadow: 0 0 0 5px rgba(255,59,48,.12); }
    @keyframes pulse { 50% { transform: scale(1.22); opacity: .7; } }

    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 23px; position: relative; z-index: 2; }
    .btn {
      border: 0;
      border-radius: 18px;
      padding: 13px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: .16s ease;
      background: rgba(255,255,255,.62);
      color: var(--ink);
      box-shadow: inset 0 1px rgba(255,255,255,.72), 0 10px 24px rgba(35,39,55,.10);
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.02); }
    .btn.primary { color: white; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .btn.danger { color: white; background: linear-gradient(135deg, #ff3b30, #ff4d9d); }
    .btn.dark { color: white; background: rgba(17,19,26,.92); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      border-radius: var(--radius-lg);
      padding: 18px;
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,.68);
      box-shadow: var(--shadow-soft);
      min-height: 174px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }
    .card::after {
      content: "";
      position: absolute;
      right: -28px;
      top: -38px;
      width: 120px;
      height: 120px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(110,92,255,.16), rgba(34,211,238,.12));
      transform: rotate(18deg);
    }
    .card .icon {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      background: rgba(255,255,255,.78);
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: inset 0 1px rgba(255,255,255,.8), 0 8px 20px rgba(35,39,55,.08);
    }
    .card h3 { margin: 13px 0 6px; font-size: 18px; letter-spacing: -.02em; }
    .card p { margin: 0; color: var(--muted); font-size: 12.5px; line-height: 1.65; min-height: 40px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 16px; position: relative; z-index: 2; }
    .tag { color: rgba(17,19,26,.55); font-size: 12px; font-weight: 800; }
    .run {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(17,19,26,.92);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: .16s ease;
    }
    .run:hover { transform: translateY(-1px); }

    .right { grid-area: right; display: grid; gap: 22px; align-content: start; }
    .logs-section { grid-area: logs; }
    .panel { border-radius: var(--radius-xl); padding: 18px; }
    .panel-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
    .panel-title h3 { margin: 0; font-size: 18px; letter-spacing: -.02em; }
    .panel-title span { color: var(--muted); font-size: 12px; font-weight: 800; }

    .camera {
      aspect-ratio: 16 / 10;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(15, 18, 26, .9);
      position: relative;
      box-shadow: inset 0 1px rgba(255,255,255,.12);
    }
    .camera img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .camera .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.72);
      text-align: center;
      padding: 20px;
    }
    .camera .placeholder strong { display: block; font-size: 18px; color: #fff; margin-bottom: 6px; }
    .camera-live img { display: block; }
    .camera-live .placeholder { display: none; }

    .manual-pad {
      display: grid;
      grid-template-columns: repeat(3, 74px);
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
    }
    .pad-btn {
      height: 62px;
      border: 0;
      border-radius: 22px;
      background: rgba(255,255,255,.70);
      box-shadow: inset 0 1px rgba(255,255,255,.9), 0 10px 22px rgba(35,39,55,.10);
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      transition: .1s ease;
    }
    .pad-btn:active { transform: scale(.96); background: rgba(17,19,26,.88); color: white; }
    .pad-empty { height: 62px; }
    .speed-row { margin-top: 16px; display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; font-weight: 800; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }

    .logs {
      height: 360px;
      overflow: auto;
      border-radius: 24px;
      padding: 16px;
      background: rgba(15, 18, 26, .92);
      color: rgba(255,255,255,.88);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.72;
      box-shadow: inset 0 1px rgba(255,255,255,.10);
      white-space: pre;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(17,19,26,.88);
      color: white;
      padding: 13px 18px;
      border-radius: 18px;
      box-shadow: 0 18px 38px rgba(0,0,0,.22);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 20;
      max-width: min(680px, calc(100vw - 32px));
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "right"
          "logs";
      }
      .right { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      .app { width: min(100vw - 22px, 1480px); margin-top: 12px; }
      .grid { grid-template-columns: 1fr; }
      .right { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .hero { padding: 20px; }
      .manual-pad { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="app">
    <main class="main" id="dashboard">
      <section class="hero glass">
        <div class="topbar">
          <div>
            <h2>陪伴型家居小车控制中心</h2>
            <p>集中控制人脸识别、外卖送餐、循迹避障、连续绕桩、天气查询、语音控制与 AI 语音聊天。按钮会直接调用同目录下的小车功能脚本。</p>
          </div>
          <div class="status-pill"><i class="dot" id="statusDot"></i><span id="statusText">空闲</span></div>
        </div>
        <div class="toolbar">
          <button class="btn primary" onclick="startTask('delivery')">启动送餐</button>
          <button class="btn dark" onclick="startTask('line_follow')">启动循迹</button>
          <button class="btn" onclick="startCamera()">打开摄像头</button>
          <button class="btn" onclick="scrollToId('manualPanel')">手动控制</button>
          <button class="btn" onclick="scrollToId('logsPanel')">运行日志</button>
          <button class="btn danger" onclick="stopAll()">紧急停车</button>
        </div>
      </section>

      <section class="grid" id="taskGrid"></section>
    </main>

    <aside class="right">
      <section class="panel glass" id="cameraPanel">
        <div class="panel-title">
          <h3>摄像头预览</h3>
          <span id="cameraState">未开启</span>
        </div>
        <div class="camera" id="cameraBox">
          <img id="cameraStream" alt="小车摄像头预览" />
          <div class="placeholder"><div><strong>摄像头预览</strong>点击“打开摄像头”后显示。人脸识别、二维码送餐等功能可在此观察画面。</div></div>
        </div>
        <div class="toolbar">
          <button class="btn primary" onclick="startCamera()">打开摄像头</button>
          <button class="btn" onclick="stopCamera()">关闭预览</button>
        </div>
      </section>

      <section class="panel glass" id="manualPanel">
        <div class="panel-title">
          <h3>手动驾驶</h3>
          <span>长按控制</span>
        </div>
        <div class="manual-pad">
          <button class="pad-btn" data-dir="rotate_left">↺</button>
          <button class="pad-btn" data-dir="forward">↑</button>
          <button class="pad-btn" data-dir="rotate_right">↻</button>
          <button class="pad-btn" data-dir="left">←</button>
          <button class="pad-btn" data-dir="stop">■</button>
          <button class="pad-btn" data-dir="right">→</button>
          <div class="pad-empty"></div>
          <button class="pad-btn" data-dir="backward">↓</button>
          <div class="pad-empty"></div>
        </div>
        <div class="speed-row"><span>速度</span><input type="range" min="15" max="80" value="34" id="speedRange" /><b id="speedValue">34</b></div>
      </section>

    </aside>

    <section class="panel glass logs-section" id="logsPanel">
      <div class="panel-title">
        <h3>运行日志</h3>
        <span id="logCount">0 行</span>
      </div>
      <div class="logs" id="logs">等待后端日志...</div>
      <div class="toolbar">
        <button class="btn" onclick="refreshStatus()">刷新</button>
        <button class="btn" onclick="clearLogs()">清空日志</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const tasks = [
      { id: 'face_login', icon: '🧑', title: '人脸识别登录', desc: '调用小车摄像头进行人脸识别，识别失败时按原程序逻辑报警。', tag: '摄像头' },
      { id: 'delivery', icon: '📦', title: '外卖送餐', desc: '二维码识别目的地，A* 路径规划，自动行驶并发送送达通知。', tag: '二维码+A*' },
      { id: 'line_follow', icon: '〰️', title: '自动循迹', desc: '四路红外传感器识别黑线，小车沿路线自动行驶。', tag: '循迹' },
      { id: 'auto_obstacle', icon: '🛡️', title: '自动避障', desc: '超声波检测障碍，自动判断绕行方向，绕开后继续运行。', tag: '超声波' },
      { id: 'continuous_obstacle', icon: '🌀', title: '连续绕桩避障', desc: '麦克纳姆轮横移绕障，多障碍物绕行，回线并自动回正。', tag: '麦克纳姆轮' },
      { id: 'weather', icon: '☁️', title: '天气查询', desc: '查询天气，生成中文提示，并通过语音或钉钉机器人播报。', tag: '天气' },
      { id: 'voice_control', icon: '🎙️', title: '语音控制', desc: '监听固定语音命令，语音启动送餐、人脸识别、循迹、天气等功能。', tag: '语音' },
      { id: 'ai_chat', icon: '🤖', title: 'AI 语音聊天', desc: '腾讯云 ASR 转文字，Dify AI 回答，腾讯云 TTS 语音播报。', tag: 'AI聊天' },
    ];

    const taskGrid = document.getElementById('taskGrid');
    const logsEl = document.getElementById('logs');
    const toastEl = document.getElementById('toast');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const cameraBox = document.getElementById('cameraBox');
    const cameraStream = document.getElementById('cameraStream');
    const cameraState = document.getElementById('cameraState');
    const speedRange = document.getElementById('speedRange');
    const speedValue = document.getElementById('speedValue');

    function renderTasks() {
      taskGrid.innerHTML = tasks.map(t => `
        <article class="card">
          <div>
            <div class="icon">${t.icon}</div>
            <h3>${t.title}</h3>
            <p>${t.desc}</p>
          </div>
          <div class="card-footer">
            <span class="tag">${t.tag}</span>
            <button class="run" onclick="startTask('${t.id}')">启动 →</button>
          </div>
        </article>
      `).join('');
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    function scrollToId(id) {
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function postJSON(url, body = {}) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({ ok: false, message: '后端返回不是 JSON' }));
      if (!res.ok || !data.ok) throw new Error(data.message || `HTTP ${res.status}`);
      return data;
    }

    async function startTask(taskId) {
      const cameraTasks = ['face_login', 'delivery'];
      if (cameraTasks.includes(taskId)) startCamera();
      try {
        const data = await postJSON(`/api/start/${taskId}`);
        showToast(data.message || '已启动');
        await refreshStatus();
      } catch (err) {
        showToast(err.message);
      }
    }

    async function stopAll() {
      try {
        const data = await postJSON('/api/stop');
        showToast(data.message || '已停止');
        await refreshStatus();
      } catch (err) {
        showToast(err.message);
      }
    }

    async function clearLogs() {
      try {
        await postJSON('/api/logs/clear');
        await refreshStatus();
      } catch (err) {
        showToast(err.message);
      }
    }

    function startCamera() {
      cameraStream.src = `/video_feed?t=${Date.now()}`;
      cameraBox.classList.add('camera-live');
      cameraState.textContent = '实时预览';
      showToast('摄像头预览已打开');
    }

    function stopCamera() {
      cameraStream.removeAttribute('src');
      cameraBox.classList.remove('camera-live');
      cameraState.textContent = '未开启';
      fetch('/api/manual/release', { method: 'POST' }).catch(() => {});
      showToast('摄像头预览已关闭');
    }

    async function manualMove(direction) {
      const speed = parseInt(speedRange.value, 10);
      try {
        await postJSON('/api/manual/move', { direction, speed });
      } catch (err) {
        showToast(err.message);
      }
    }

    function bindManualButtons() {
      document.querySelectorAll('.pad-btn').forEach(btn => {
        const dir = btn.dataset.dir;
        const down = (e) => { e.preventDefault(); manualMove(dir); };
        const up = (e) => { e.preventDefault(); manualMove('stop'); };
        btn.addEventListener('mousedown', down);
        btn.addEventListener('touchstart', down, { passive: false });
        btn.addEventListener('mouseup', up);
        btn.addEventListener('mouseleave', up);
        btn.addEventListener('touchend', up, { passive: false });
        btn.addEventListener('touchcancel', up, { passive: false });
      });
      speedRange.addEventListener('input', () => speedValue.textContent = speedRange.value);
    }

    async function refreshStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const running = Boolean(data.running);
        statusText.textContent = running ? `运行中：${data.task?.label || '任务'}` : (data.stop_flag ? '已停车' : '空闲');
        statusDot.classList.toggle('running', running);
        statusDot.classList.toggle('stop', !running && data.stop_flag);
        const lines = data.logs || [];
        logsEl.textContent = lines.length ? lines.join('\n') : '暂无日志';
        document.getElementById('logCount').textContent = `${lines.length} 行`;
        logsEl.scrollTop = logsEl.scrollHeight;
      } catch (err) {
        statusText.textContent = '后端离线';
        statusDot.classList.remove('running');
        statusDot.classList.add('stop');
        logsEl.textContent = `无法连接后端：${err.message}`;
      }
    }

    renderTasks();
    bindManualButtons();
    refreshStatus();
    setInterval(refreshStatus, 1200);
    window.addEventListener('beforeunload', () => navigator.sendBeacon('/api/manual/release'));
  </script>
</body>
</html>
